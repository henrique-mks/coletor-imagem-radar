# Configuração do Coletor de Imagem de Radar — GOES-19 (NODD → nosso S3).
# Copie para `config.toml` e ajuste. Credenciais do destino (S3) vêm do AMBIENTE
# (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY), nunca deste arquivo.

[source]
# Bucket público do NOAA NODD. Leitura anônima (sem assinatura).
bucket = "noaa-goes19"
region = "us-east-1"

[destination]
# Nosso S3 (AWS). Destino dos PMTiles.
bucket = "qualle-goes19"
region = "us-east-1"
# Prefixo-raiz das chaves no destino (layout normalizado do plano).
prefix = "goes19"
# Dev/teste: grava no filesystem local em vez do S3 (descomente).
# local_path = "./out-s3"

# --- Produtos (Fase 2+). No esqueleto podem ficar vazios. ---

[[products]]
name = "abi-l2-cmipf-c13"   # ch13: temp. de topo de nuvem (chuva)
source_prefix = "ABI-L2-CMIPF"
channel = "C13"
poll_interval_secs = 120     # full disk ~10 min

[[products]]
name = "glm-l2-lcfa"         # raios (Flash) — ~3 arquivos/min
source_prefix = "GLM-L2-LCFA"
poll_interval_secs = 60
